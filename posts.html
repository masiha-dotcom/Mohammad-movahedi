<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blog</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial, sans-serif;
    background:#f9f9f9;
    margin:0;
    padding:0;
}

header{
    background:#111;
    color:white;
    padding:25px;
    text-align:center;
}

.container{
    width:90%;
    max-width:900px;
    margin:auto;
    padding:40px 0;
}

.post-card{
    background:white;
    padding:25px;
    margin-bottom:25px;
    border-radius:12px;
    box-shadow:0 3px 15px rgba(0,0,0,0.08);
    transition:0.3s;
}

.post-card:hover{
    transform:translateY(-5px);
}

.post-card h2{
    margin-top:0;
}

.post-card span{
    display:block;
    margin-top:15px;
    color:gray;
    font-size:14px;
}
</style>
</head>

<body>

<header>
<h1>Blog</h1>
<p>Latest Telegram Posts</p>
</header>

<div class="container">
<div id="posts">Loading posts...</div>
</div>

<script>
const feedURL = "https://rsshub.app/telegram/channel/Mova97M";

fetch(feedURL)
.then(res => res.json())
.then(data => {

    const container = document.getElementById("posts");
    container.innerHTML = "";

    data.items.forEach(post => {

        const card = document.createElement("div");
        card.className = "post-card";

        card.innerHTML = `
            <h2>${post.title || ""}</h2>
            <p>${post.description || ""}</p>
            <span>${post.pubDate || ""}</span>
        `;

        container.appendChild(card);

    });

})
.catch(()=>{
    document.getElementById("posts").innerHTML =
    "Unable to load posts.";
});
</script>

</body>
</html>
