<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blog</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background:#ffffff;
    margin:0;
}

header{
    text-align:center;
    padding:60px 20px 40px;
}

header h1{
    font-size:42px;
    margin-bottom:10px;
}

.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}

.post-card{
    background:#fafafa;
    border-radius:16px;
    padding:30px;
    margin-bottom:30px;
    transition:0.35s ease;
    border:1px solid #eee;
}

.post-card:hover{
    transform:translateY(-6px);
}

.post-card h2{
    margin-top:0;
    font-size:24px;
}

.post-card p{
    line-height:1.7;
    color:#333;
}

.post-card span{
    display:block;
    margin-top:18px;
    font-size:13px;
    color:#777;
}

</style>
</head>

<body>

<header>
<h1>Blog</h1>
<p>Latest Posts</p>
</header>

<div class="container">
<div id="posts">Loading...</div>
</div>

<script>

const feedURL = "https://rsshub.app/telegram/channel/Mova97M";

fetch(feedURL)
.then(res => res.json())
.then(data => {

    const container = document.getElementById("posts");
    container.innerHTML = "";

    data.items.forEach(post => {

        const card = document.createElement("div");
        card.className = "post-card";

        card.innerHTML = `
            <h2>${post.title || ""}</h2>
            <p>${post.description || ""}</p>
            <span>${post.pubDate || ""}</span>
        `;

        container.appendChild(card);

    });

})
.catch(()=>{
    document.getElementById("posts").innerHTML =
    "Unable to load posts.";
});

</script>

</body>
</html>
