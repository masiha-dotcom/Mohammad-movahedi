<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blog</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#fff;
    margin:0;
}

header{
    text-align:center;
    padding:60px 20px 30px;
}

header h1{
    font-size:44px;
    margin:0;
}

header p{
    color:#666;
}

.container{
    max-width:720px;
    margin:auto;
    padding:30px 20px 80px;
}

/* Card style */
.post-box{
    border:1px solid #eee;
    border-radius:18px;
    padding:30px;
    margin-bottom:40px;
    transition:.3s;
}

.post-box:hover{
    transform:translateY(-6px);
    box-shadow:0 8px 25px rgba(0,0,0,.06);
}

.error{
    color:red;
    text-align:center;
}

</style>
</head>

<body>

<header>
<h1>Blog</h1>
<p>Latest Posts</p>
</header>

<div class="container">

<div class="post-box">

<script async src="https://telegram.org/js/telegram-widget.js?22"
data-telegram-post="Mova97M/1"
data-width="100%">
</script>

</div>

</div>

</body>
</html>
