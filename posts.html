<section class="section">
  <div class="container">
    <h3>Latest Telegram Posts</h3>
    <div id="telegram-posts"></div>
  </div>
</section>
 <script>
const channel = "Mova97M";

fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://t.me/s/${channel}`)
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById("telegram-posts");

    data.items.slice(0, 5).forEach(post => {
      const div = document.createElement("div");
      div.className = "project";

      div.innerHTML = `
        <h4>${post.title || "Telegram Post"}</h4>
        <p>${post.description.substring(0, 200)}...</p>
        <a href="${post.link}" target="_blank">Read on Telegram →</a>
      `;

      container.appendChild(div);
    });
  })
  .catch(err => console.log(err));
</script>
  <section class="section">
  <div class="container">
    <h3>Latest Telegram Posts</h3>

    <script async src="https://telegram.org/js/telegram-widget.js?22"
            data-telegram-post="Mova97M/1"
            data-width="100%">
    </script>

    <script async src="https://telegram.org/js/telegram-widget.js?22"
            data-telegram-post="Mova97M/2"
            data-width="100%">
    </script>

    <script async src="https://telegram.org/js/telegram-widget.js?22"
            data-width="100%">
    </script>

  </div>
</section>
